name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-line-art
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync source to server
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude '.env' \
            --exclude '.venv' --exclude 'build' --exclude 'dist' \
            --exclude 'generated_images' --exclude 'comfyui-data' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/line_art/"

      - name: Remote build + restart
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'bash /opt/line_art/deploy/deploy.sh'
